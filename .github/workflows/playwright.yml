name: Playwright Tests

on:
#   push:
#     branches: [master]
#   pull_request:
#     branches: [master]
  workflow_dispatch:  # manual trigger button in GitHub UI

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      
      - name: cache playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit !='true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only (if cached)
        if: steps.playwright-cache.outputs.cache-hit =='true'
        run: npx playwright install --with-deps chromium  

      - name: Run tests
        run: npx playwright test tests/loginfix.spec.ts --project=chromium
        env:
          ENV: qa
          BASE_URL: ${{ secrets.BASE_URL }}
          USER: ${{ secrets.USER }}
          PASSWORD: ${{ secrets.PASSWORD }}
          BASEAPI_URL: ${{ secrets.BASEAPI_URL }}
          API_TOKEN: ${{ secrets.TOKEN }}
          OAUTH_CLIENTID: ${{ secrets.OAUTH_CLIENTID }}
          OAUTH_CLIENTSECRET: ${{ secrets.OAUTH_CLIENTSECRET }}
          OAUTH_GRANTTYPE: ${{ secrets.OAUTH_GRANTTYPE }}

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: reports/html-report/
          retention-days: 30

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30